<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Entsorgungs-Karte – Ladestellen</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --ui-bg:#ffffff; --ui-text:#0f172a; --ui-muted:#475569;
      --ui-border:rgba(15,23,42,.12); --ui-soft:rgba(15,23,42,.05);
      --ui-soft2:rgba(15,23,42,.08); --ui-shadow:0 12px 34px rgba(2,6,23,.12);

      --inp-bg:#ffffff; --inp-text:#0f172a; --inp-border:rgba(15,23,42,.18);
      --inp-ph:rgba(15,23,42,.45); --inp-focus:rgba(37,99,235,.45);

      --btn-bg:rgba(15,23,42,.06); --btn-border:rgba(15,23,42,.14); --btn-text:#0f172a;
      --btn-primary:#22c55e; --btn-primary-text:#052e16;

      --popup-bg:#ffffff; --popup-text:#0f172a; --popup-border:rgba(15,23,42,.12);
      --pill-bg:rgba(15,23,42,.05); --pill-border:rgba(15,23,42,.12);

      --good:#16a34a; --mid:#f59e0b; --bad:#dc2626;
      --route:#2563eb;

      --highlight:#e11d48;
      --highlight-ring:rgba(225,29,72,.22);
    }

    body.dark{
      --ui-bg:#0b1220; --ui-text:#e5e7eb; --ui-muted:#a3adc2;
      --ui-border:rgba(148,163,184,.18); --ui-soft:rgba(148,163,184,.10);
      --ui-soft2:rgba(148,163,184,.14); --ui-shadow:0 12px 34px rgba(0,0,0,.35);

      --inp-bg:#0f172a; --inp-text:#e5e7eb; --inp-border:rgba(148,163,184,.22);
      --inp-ph:rgba(229,231,235,.55); --inp-focus:rgba(59,130,246,.55);

      --btn-bg:rgba(148,163,184,.10); --btn-border:rgba(148,163,184,.22); --btn-text:#e5e7eb;

      --popup-bg:#0f172a; --popup-text:#e5e7eb; --popup-border:rgba(148,163,184,.22);

      --pill-bg:rgba(148,163,184,.10); --pill-border:rgba(148,163,184,.22);
      --route:#60a5fa;

      --highlight:#fb7185;
      --highlight-ring:rgba(251,113,133,.22);
    }

    html,body{height:100%;margin:0;background:var(--ui-bg);overscroll-behavior:none;}
    #map{position:absolute;inset:0;width:100%;height:100%;background:#d1d5db;}

    .topbar{
      position:fixed; top:0; left:0; right:0; z-index:3000;
      display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;
      padding:10px 12px;
      border-radius:0 0 14px 14px;
      background:var(--ui-bg);
      border:1px solid var(--ui-border);
      border-top:none;
      box-shadow:var(--ui-shadow);
      font:14px/1.2 system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--ui-text);
      backdrop-filter: blur(6px);
    }

    .brandBlock{display:flex;flex-direction:column;gap:6px;align-items:flex-start;margin-right:4px;}
    .brand{font-weight:900;white-space:nowrap;line-height:1;}

    .field{display:flex;flex-direction:column;gap:4px}
    .field label{font-size:11px;color:var(--ui-muted);margin-left:2px}
    .field input,.field select{
      height:34px;padding:0 10px;border-radius:10px;
      border:1px solid var(--inp-border);
      background:var(--inp-bg);color:var(--inp-text);outline:none;min-width:120px;
    }
    .field input::placeholder{color:var(--inp-ph)}
    .field input:focus,.field select:focus{border-color:var(--inp-focus);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .w240{min-width:240px}
    .w180{min-width:180px}
    .w160{min-width:160px}
    .w120{min-width:120px}

    .btn{
      height:34px;padding:0 12px;border-radius:10px;
      border:1px solid var(--btn-border);
      background:var(--btn-bg);color:var(--btn-text);
      cursor:pointer;font-weight:800;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;user-select:none;
    }
    .btn.primary{background:var(--btn-primary);border-color:var(--btn-primary);color:var(--btn-primary-text);}
    .btn:active{transform:translateY(1px)}

    .pill{
      align-self:center;
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--pill-border);background:var(--pill-bg);
      white-space:nowrap;font-weight:900;color:var(--ui-text);
      display:flex;gap:10px;align-items:center;
    }
    .pill.clickable{cursor:pointer}
    .pill.clickable:hover{filter:brightness(.98)}
    #loadStatus{margin-left:auto;}
    .dot{width:8px;height:8px;border-radius:50%;background:rgba(148,163,184,.8);display:inline-block;}
    .statusNum{font-weight:900}
    .statusOpen{color:var(--bad)}
    .statusLoaded{color:var(--good)}

    .panel{
      position:absolute; top:88px; right:12px; z-index:2500;
      width:780px; max-height:calc(100vh - 110px);
      display:flex; flex-direction:column;
      background:var(--ui-bg);
      border:1px solid var(--ui-border);
      border-radius:16px;
      box-shadow:var(--ui-shadow);
      overflow:hidden;
      font:14px/1.25 system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--ui-text);
      user-select:none;
    }
    .panel.hidden{display:none;}
    .panel-h{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 12px;background:var(--ui-soft);
      border-bottom:1px solid var(--ui-border);
      cursor:move;
    }
    .panel-h .t{font-weight:900;display:flex;align-items:center;gap:10px;}
    .panel-b{padding:10px 12px;overflow:auto;user-select:text;}

    .x{
      width:30px;height:30px;border-radius:10px;border:1px solid var(--ui-border);
      background:var(--ui-soft2);color:var(--ui-text);
      cursor:pointer;font-weight:900;
      display:inline-flex;align-items:center;justify-content:center;
    }

    .kpis{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
    .kpi{border:1px solid var(--ui-border);background:var(--ui-soft);border-radius:14px;padding:10px;}
    .kpi .h{font-size:12px;color:var(--ui-muted)}
    .kpi .v{font-weight:900;font-size:16px;margin-top:2px}
    .small{font-size:12px;color:var(--ui-muted)}

    .detail{
      border:1px solid var(--ui-border);
      background:var(--ui-soft);
      border-radius:14px;padding:10px;
      margin:10px 0 12px 0;
    }
    .detail .title{font-weight:900;margin-bottom:6px}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;font-size:13px;}
    .kv{display:flex;justify-content:space-between;gap:10px}
    .k{color:var(--ui-muted)}
    .v{font-weight:900}

    table{width:100%;border-collapse:collapse;font-size:13px;}
    th,td{padding:10px 6px;border-bottom:1px solid var(--ui-border);vertical-align:top;text-align:left;}
    th{font-size:12px;color:var(--ui-muted);font-weight:900;position:sticky;top:0;background:var(--ui-bg);}
    tr{cursor:pointer}
    tr:hover{background:var(--ui-soft)}
    .badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:900;border:1px solid var(--ui-border);background:var(--ui-soft);white-space:nowrap;color:var(--ui-text);}
    .good{background:rgba(22,163,74,.14); border-color:rgba(22,163,74,.35); color:var(--good)}
    .mid{background:rgba(245,158,11,.16); border-color:rgba(245,158,11,.35); color:var(--mid)}
    .bad{background:rgba(220,38,38,.14); border-color:rgba(220,38,38,.35); color:var(--bad)}

    .leaflet-popup-content-wrapper, .leaflet-popup-tip{
      background:var(--popup-bg);
      color:var(--popup-text);
      border:1px solid var(--popup-border);
      box-shadow:0 12px 34px rgba(2,6,23,.12);
    }

    .startMarker{
      width:18px;height:18px;border-radius:50%;
      background:var(--highlight);
      box-shadow:0 0 0 4px var(--highlight-ring), 0 4px 10px rgba(2,6,23,.28);
      border:2px solid white;
    }

    .missPanel{
      position:absolute;
      top:88px;
      left:12px;
      z-index:2600;
      width:460px;
      max-width:calc(100vw - 24px);
      max-height:calc(100vh - 110px);
      display:flex;
      flex-direction:column;
      background:var(--ui-bg);
      border:1px solid var(--ui-border);
      border-radius:16px;
      box-shadow:var(--ui-shadow);
      overflow:hidden;
      font:14px/1.25 system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--ui-text);
    }
    .missPanel.hidden{display:none;}
    .missPanel.dragging{transition:none !important;}

    .missHead{
      display:flex;align-items:center;justify-content:space-between;
      padding:10px 12px;background:var(--ui-soft);border-bottom:1px solid var(--ui-border);
      font-weight:900;
      cursor:move;
      user-select:none;
    }
    .missHeadActions{display:flex;gap:8px;align-items:center}
    .missTabs{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid var(--ui-border)}
    .missTab{
      padding:7px 10px;border-radius:999px;border:1px solid var(--ui-border);
      background:var(--ui-soft);cursor:pointer;font-weight:800;
    }
    .missTab.active{background:var(--btn-primary);border-color:var(--btn-primary);color:var(--btn-primary-text)}
    .missBody{padding:10px 12px;overflow:auto}
    .missList{display:flex;flex-direction:column;gap:8px}
    .missItem{
      border:1px solid var(--ui-border);
      background:var(--ui-soft);
      border-radius:12px;padding:10px;
    }
    .missTitle{font-weight:900;margin-bottom:4px}
    .missMeta{font-size:12px;color:var(--ui-muted)}
    .missEmpty{
      border:1px dashed var(--ui-border);
      border-radius:12px;padding:16px;text-align:center;color:var(--ui-muted);
      background:var(--ui-soft);
    }

    #btnMenu{display:none;}
    .drawerBackdrop{
      position:fixed;inset:0;z-index:4500;
      background:rgba(0,0,0,.38);
      backdrop-filter: blur(2px);
      display:none;
    }
    .drawer{
      position:fixed; top:0; bottom:0; left:0; z-index:5000;
      width:min(360px, 88vw);
      background:var(--ui-bg);
      border-right:1px solid var(--ui-border);
      box-shadow:18px 0 40px rgba(0,0,0,.22);
      transform:translateX(-102%);
      transition:transform .22s ease;
      display:flex;flex-direction:column;
      padding:12px;gap:10px;overflow:auto;-webkit-overflow-scrolling:touch;
    }
    .drawer.open{transform:translateX(0);}
    .drawerTop{
      display:flex;align-items:center;justify-content:space-between;
      padding-bottom:8px;border-bottom:1px solid var(--ui-border);
    }
    .drawerTitle{font-weight:900}
    .drawerClose{
      width:34px;height:34px;border-radius:12px;border:1px solid var(--ui-border);
      background:var(--ui-soft2); color:var(--ui-text);
      cursor:pointer; font-weight:900;
    }
    .drawerGrid{display:grid;grid-template-columns:1fr;gap:10px;padding-bottom:12px;}

    .panel.mobileSheet{
      position:fixed; left:10px; right:10px;
      top:auto; bottom:10px; width:auto;
      max-height:72vh; border-radius:18px; z-index:5200;
    }
    .panel.mobileSheet .panel-h{cursor:default;user-select:none;}
    .grab{
      width:44px;height:5px;border-radius:999px;
      background:rgba(148,163,184,.65);
      display:none;
    }
    .panel.mobileSheet .grab{display:inline-block;}
    .panel.mobileSheet.collapsed{max-height:54px;overflow:hidden;}
    .panel.mobileSheet.collapsed .panel-b{display:none;}

    @media (max-width: 760px){
      .topbar{gap:8px;padding:8px 10px;align-items:center;}
      .topbar .desktopOnly{display:none !important;}
      #btnMenu{display:inline-flex;}
      #loadStatus{margin-left:0;}
      .kpis{grid-template-columns:1fr;}
      .detail-grid{grid-template-columns:1fr;}
      .missPanel{
        top:auto;
        bottom:10px;
        left:10px;
        right:10px;
        width:auto;
        max-height:60vh;
      }
    }
  </style>
</head>

<body>
<div id="map"></div>

<div class="topbar" id="topbar">
  <button class="btn" id="btnMenu" title="Menü">☰</button>

  <div class="brandBlock">
    <div class="brand">Entsorgungs-Karte</div>
  </div>

  <div class="field w240 desktopOnly">
    <label>PLZ oder Stadt Lieferant</label>
    <input id="supplierQuery" placeholder="z. B. 28195 oder Bremen">
  </div>

  <div class="field w180 desktopOnly">
    <label>Behandlung</label>
    <select id="treatment">
      <option value="">Bitte wählen</option>
      <option value="Sortierung">Sortierung</option>
      <option value="Thermisch">Thermisch</option>
    </select>
  </div>

  <div class="field w180 desktopOnly">
    <label>AVV</label>
    <select id="avvSelect">
      <option value="">Lade AVVs…</option>
    </select>
  </div>

  <div class="field w120 desktopOnly">
    <label>Menge (t)</label>
    <input id="qtyT" type="number" min="0.1" step="0.1" value="24">
  </div>

  <div class="field w120 desktopOnly">
    <label>Fracht €/km</label>
    <input id="freightPerKm" type="number" step="0.01" value="1.85">
  </div>

  <div class="field w160 desktopOnly">
    <label>Rechenmodus</label>
    <select id="calcMode">
      <option value="targetEk">Ziel-EK</option>
      <option value="targetMargin">Ziel-Rohertrag</option>
    </select>
  </div>

  <div class="field w160 desktopOnly">
    <label id="targetValueLabel">Ziel-EK €/t</label>
    <input id="targetValue" type="number" step="0.01" placeholder="optional">
  </div>

  <button class="btn" id="btnTheme" title="Hell/Dunkel umschalten">🌙</button>
  <button class="btn" id="btnGeo" title="Ladestellen geocoden">📍 Geocoden</button>
  <button class="btn primary" id="btnCalc">Berechnen</button>

  <div class="pill clickable" id="loadStatus" title="Klicken für Details"></div>
</div>

<div id="drawerBackdrop" class="drawerBackdrop"></div>
<aside id="drawer" class="drawer" aria-hidden="true">
  <div class="drawerTop">
    <div class="drawerTitle">Filter & Einstellungen</div>
    <button class="drawerClose" id="drawerClose" title="Schließen">✕</button>
  </div>

  <div class="drawerGrid">
    <div class="field">
      <label>PLZ oder Stadt Lieferant</label>
      <input id="supplierQueryMobile" placeholder="z. B. 28195 oder Bremen">
    </div>

    <div class="field">
      <label>Behandlung</label>
      <select id="treatmentMobile"></select>
    </div>

    <div class="field">
      <label>AVV</label>
      <select id="avvSelectMobile"></select>
    </div>

    <div class="field">
      <label>Menge (t)</label>
      <input id="qtyTMobile" type="number" min="0.1" step="0.1" value="24">
    </div>

    <div class="field">
      <label>Fracht €/km</label>
      <input id="freightPerKmMobile" type="number" step="0.01" value="1.85">
    </div>

    <div class="field">
      <label>Rechenmodus</label>
      <select id="calcModeMobile"></select>
    </div>

    <div class="field">
      <label id="targetValueLabelMobile">Ziel-EK €/t</label>
      <input id="targetValueMobile" type="number" step="0.01" placeholder="optional">
    </div>

    <button class="btn" id="btnGeoMobile">📍 Geocoden</button>
    <button class="btn primary" id="btnCalcMobile">Berechnen</button>
  </div>
</aside>

<div id="panel" class="panel hidden">
  <div id="panelHeader" class="panel-h" title="Antippen: ein/ausklappen (mobil)">
    <div class="t"><span class="grab"></span> Ergebnisse</div>
    <button id="closePanel" class="x" title="Schließen">✕</button>
  </div>
  <div class="panel-b">
    <div class="kpis">
      <div class="kpi">
        <div class="h">Startpunkt</div>
        <div class="v" id="kpiStart">—</div>
        <div class="small" id="kpiStartSub">PLZ oder Stadt Lieferant</div>
      </div>
      <div class="kpi">
        <div class="h">Treffer</div>
        <div class="v" id="kpiCount">—</div>
        <div class="small" id="kpiQty">Menge: —</div>
      </div>
      <div class="kpi">
        <div class="h">Route</div>
        <div class="v" id="kpiRoute">—</div>
        <div class="small">Klick auf Zeile lädt Route</div>
      </div>
    </div>

    <div class="detail" id="detailBox" style="display:none">
      <div class="title" id="detailTitle">Details</div>
      <div class="detail-grid" id="detailGrid"></div>
    </div>

    <div class="small" style="margin:6px 0 10px 0">
      Lieferant als PLZ oder Stadt eingeben → Behandlung wählen → AVV wählen → Rechenmodus wählen → Berechnen.
    </div>

    <div id="results"></div>
  </div>
</div>

<div id="missPanel" class="missPanel hidden">
  <div class="missHead">
    <div>Nicht geladene / unvollständige Einträge</div>
    <div class="missHeadActions">
      <button class="btn" id="btnExportMissing" title="CSV exportieren">Export</button>
      <button class="x" id="btnCloseMissing" title="Schließen">✕</button>
    </div>
  </div>
  <div class="missTabs">
    <button class="missTab active" data-tab="missingGeo">Ohne Koordinaten</button>
    <button class="missTab" data-tab="missingAvv">Ohne AVV</button>
    <button class="missTab" data-tab="missingTreatment">Ohne Behandlung</button>
    <button class="missTab" data-tab="allIssues">Alle Probleme</button>
  </div>
  <div class="missBody" id="missBody"></div>
</div>

<script>
function saveLS(key, obj){
  try{ localStorage.setItem(key, JSON.stringify(obj)); }catch(e){}
}
function loadLS(key, fallback){
  try{
    const s = localStorage.getItem(key);
    return s ? JSON.parse(s) : fallback;
  }catch(e){ return fallback; }
}

const CONFIG = {
  spreadsheetId: "1PqhRHsa_QDn8DZ1NuNuBfDgJA-paes68_EZ-KZ7kxGs"
};

const URLS = {
  ladestellen: `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?tqx=out:csv&sheet=ladestellen`,
  avv: `https://docs.google.com/spreadsheets/d/${CONFIG.spreadsheetId}/gviz/tq?tqx=out:csv&sheet=avv`
};

const LS_THEME_KEY = "wasteMap_theme_v12";
const LS_PANEL_POS_KEY = "wasteMap_panelPos_v12";
const LS_SUPPLIER_CACHE = "wasteMap_supplierGeo_v12";
const LS_ROUTE_CACHE = "wasteMap_routeCache_v10";
const LS_STATION_GEO_CACHE = "wasteMap_stationGeo_v9";

let map;
let isMobile = false;

let ladestellen = [];
let avvRows = [];
let avvMap = new Map();

let startPoint = null;
let startMarker = null;
let startCircle = null;
let routeLayer = null;
let lastResults = [];
let currentFocusedRow = null;
let stationMarkers = [];

let supplierGeoCache = loadLS(LS_SUPPLIER_CACHE, {});
let routeCache = loadLS(LS_ROUTE_CACHE, {});
let stationGeoCache = loadLS(LS_STATION_GEO_CACHE, {});
let currentMissingTab = "missingGeo";

function applyThemeFromLS(){
  const t = loadLS(LS_THEME_KEY, "light");
  if(t === "dark") document.body.classList.add("dark");
}

window.addEventListener("load", ()=>init().catch(err=>{
  console.error("INIT ERROR:", err);
  alert("Fehler beim Laden der Karte. Öffne F12 → Konsole für Details.");
}));

async function init(){
  applyThemeFromLS();

  map = L.map("map", { worldCopyJump:true }).setView([51.2, 10.4], 6);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  setTimeout(()=>map.invalidateSize(), 100);

  initUI();
  initMobileUI();
  initPanelDragDesktopOnly();
  initMissingPanelDrag();
  applyResponsiveLayout();
  window.addEventListener("resize", applyResponsiveLayout);

  updateLoadStatus("Lade Tabellen …");

  await loadAvv();
  await loadLadestellen();

  fillAvvDropdown();
  renderStations();
  updateModeLabels();
  refreshLoadStatus();
}

function initUI(){
  document.getElementById("btnTheme").addEventListener("click", ()=>{
    document.body.classList.toggle("dark");
    saveLS(LS_THEME_KEY, document.body.classList.contains("dark") ? "dark" : "light");
    renderStations(lastResults);
  });

  document.getElementById("btnCalc").addEventListener("click", calculate);
  document.getElementById("btnGeo").addEventListener("click", runStationGeocode);
  document.getElementById("closePanel").addEventListener("click", ()=>{
    document.getElementById("panel").classList.add("hidden");
  });

  document.getElementById("calcMode").addEventListener("change", updateModeLabels);

  const header = document.getElementById("panelHeader");
  header.addEventListener("click", (e)=>{
    if(e.target && e.target.id === "closePanel") return;
    if(!isMobile) return;
    document.getElementById("panel").classList.toggle("collapsed");
  });

  document.getElementById("loadStatus").addEventListener("click", ()=>{
    toggleMissingPanel();
  });

  document.getElementById("btnCloseMissing").addEventListener("click", closeMissingPanel);
  document.getElementById("btnExportMissing").addEventListener("click", exportMissingCsv);

  document.querySelectorAll(".missTab").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(".missTab").forEach(x=>x.classList.remove("active"));
      btn.classList.add("active");
      currentMissingTab = btn.dataset.tab;
      renderMissingPanel();
    });
  });
}

function initMobileUI(){
  document.getElementById("btnMenu").addEventListener("click", toggleDrawer);
  document.getElementById("drawerClose").addEventListener("click", closeDrawer);
  document.getElementById("drawerBackdrop").addEventListener("click", closeDrawer);

  syncMobileInput("supplierQuery", "supplierQueryMobile");
  syncMobileSelect("treatment", "treatmentMobile");
  syncMobileSelect("avvSelect", "avvSelectMobile");
  syncMobileInput("qtyT", "qtyTMobile");

function initMissingPanelDrag(){

  let sx = 0, sy = 0, sl = 0, st = 0;

    if(e.target && (e.target.id === "btnCloseMissing" || e.target.id === "btnExportMissing")) return;

    dragging = true;

    const r = panel.getBoundingClientRect();
    sx = e.clientX;
    sy = e.clientY;
    sl = r.left;
    st = r.top;

    panel.style.left = sl + "px";
    panel.style.top = st + "px";
    panel.style.right = "auto";
    panel.style.bottom = "auto";

    e.preventDefault();
  });

    if(!dragging) return;

    const panelW = panel.offsetWidth || 460;
    const panelH = panel.offsetHeight || 320;
    const maxX = Math.max(10, window.innerWidth - panelW - 10);

function normalizeHeaderName(h){
  return String(h || "")
    .trim()
    .toLowerCase()
    .replace(/\u00a0/g, " ")
    .replace(/\s+/g, " ")
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss");
}

function parseCsv(url){
  return new Promise((resolve, reject)=>{
    Papa.parse(url, {
      download:true,
      header:true,
      skipEmptyLines:true,
      delimiter:"",
      transformHeader:(h)=>normalizeHeaderName(h),
      complete:(res)=>{
        const first = res?.data?.[0];
        const keys = first ? Object.keys(first) : [];
        if(first && keys.length <= 1){
          Papa.parse(url, {
            download:true,
            header:true,
            skipEmptyLines:true,
            delimiter:";",
            transformHeader:(h)=>normalizeHeaderName(h),
            complete:(res2)=>resolve(res2.data),
            error:reject
          });
          return;
        }
        resolve(res.data);
      },
      error:reject
    });
  });
}

function findValueByHeader(row, possibleKeys){
  const keys = Object.keys(row || {});
  const normalizedKeys = keys.map(k => ({ raw:k, norm:normalizeHeaderName(k) }));

  for(const wanted of possibleKeys){
    const wantedNorm = normalizeHeaderName(wanted);
    const hit = normalizedKeys.find(k => k.norm === wantedNorm);
    if(hit) return row[hit.raw];
  }
  return "";
}

function getFirstFilledValue(row, possibleKeys){
  for(const key of possibleKeys){
    const val = findValueByHeader(row, [key]);
    if(String(val ?? "").trim() !== "") return val;
  }
  return "";
}

function getAllFilledValues(row, possibleKeys){
  const values = [];
  for(const key of possibleKeys){
    const val = findValueByHeader(row, [key]);
    if(String(val ?? "").trim() !== "") values.push(val);
  }
  return values;
}
function extractValidAvvsFromRow(row){
  const validAvvs = new Set(avvRows.map(x => cleanAvvCode(x.avv)).filter(Boolean));

  const rawText = Object.values(row || {})
    .map(v => str(v))
    .join(" ; ");

  if(!rawText.trim()) return [];

  const matches = rawText.match(/\d{5,6}|\d{2}\s*\d{2}\s*\d{2}/g) || [];
  const found = [];
  const seen = new Set();

  for(const m of matches){
    const code = cleanAvvCode(m);
    if(!code) continue;
    if(!validAvvs.has(code)) continue;
    if(seen.has(code)) continue;
    seen.add(code);
    found.push(code);
  }

  return found;
}

  ladestellen = rows.map((r, idx)=>{

  .filter(([k,v]) => /avv/i.test(k))
  .map(([k,v]) => str(v).trim())
  .filter(Boolean)
  .join(";");
    const behandlung = str(getFirstFilledValue(r, ["behandlung"])).trim();

    let lat = toNum(getFirstFilledValue(r, ["lat","latitude"]));

      lat = toNum(stationGeoCache[rowKey].lat);
      lon = toNum(stationGeoCache[rowKey].lon);
    }else if((!isFinite(lat) || !isFinite(lon)) && stationGeoCache[queryKey]){
      lat = toNum(stationGeoCache[queryKey].lat);
      lon = toNum(stationGeoCache[queryKey].lon);
    }

    return {
      id: "L"+idx,
      rowIndex: idx + 2,

      ladestelle,

      lon,
      preisBasis: toNum(getFirstFilledValue(r, ["preis_basis","preis basis"])),

function renderStations(results=null){
  stationMarkers.forEach(m=>{
    try{ map.removeLayer(m); }catch(e){}
  });
  stationMarkers = [];

  const highlight = getComputedStyle(document.body).getPropertyValue("--highlight").trim() || "#e11d48";
  const highlightRing = getComputedStyle(document.body).getPropertyValue("--highlight-ring").trim() || "rgba(225,29,72,.22)";
  const outline = document.body.classList.contains("dark") ? "rgba(229,231,235,.9)" : "rgba(15,23,42,.9)";

  const scoreMap = new Map();
  if(Array.isArray(results)){
    for(const r of results) scoreMap.set(r.entity.id, r);
  }

  for(const x of getRenderableStations()){
    const row = scoreMap.get(x.id);
    const isSelected = currentFocusedRow && currentFocusedRow.entity.id === x.id;

    let fill = "#64748b";
    if(row) fill = getResultColor(row);

    const m = L.circleMarker([x.lat, x.lon], {
      radius:isSelected ? 10 : 7,
      color:isSelected ? highlight : outline,
      weight:isSelected ? 4 : 2,
      fillColor:fill,
      fillOpacity:.9
    }).addTo(map);

    if(isSelected){
      const ring = L.circleMarker([x.lat,x.lon], {
        radius:18,color:highlight,weight:2,fillColor:highlightRing,fillOpacity:0.18
      }).addTo(map);
      stationMarkers.push(ring);
    }

    const popupText = `
      <b>${esc(x.firma || "—")}</b><br>
      ${esc(x.ladestelle || "—")}<br>
      <small>AVV: ${esc((x.avvList && x.avvList.length ? x.avvList.join(", ") : x.avvRaw) || "—")} · ${esc(x.behandlung || "—")} · Basis: ${fmt(x.preisBasis)} €/t</small>
    `;

    m.bindPopup(popupText);
    m.on("click", async ()=>{
      const hit = lastResults.find(r => r.entity.id === x.id);
      if(hit && startPoint){
        await showRouteDetails(startPoint, x, hit);
      }else{
        m.openPopup();
      }
    });

    stationMarkers.push(m);
  }
}

async function geocodeSupplierLocation(query){
  const clean = String(query || "").trim();
  if(!clean) return null;

  const cacheKey = "supplier__" + normText(clean);
  if(supplierGeoCache[cacheKey]) return supplierGeoCache[cacheKey];

  const q = `${clean}, Deutschland`;
  const url = "https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=de&q=" + encodeURIComponent(q);

  try{
    const res = await fetch(url, { headers: { "Accept":"application/json" } });
    const data = await res.json();
    if(data && data[0]){
      const result = {
        lat: parseFloat(data[0].lat),
        lon: parseFloat(data[0].lon),
        label: data[0].display_name || q
      };
      if(isFinite(result.lat) && isFinite(result.lon)){
        supplierGeoCache[cacheKey] = result;
        saveLS(LS_SUPPLIER_CACHE, supplierGeoCache);
        return result;
      }
    }
  }catch(e){
    console.error("Geocode Fehler:", e);
  }
  return null;
}

async function runStationGeocode(){
  const missing = getMissingGeoRows().filter(x => x.geoQuery);

  if(!missing.length){
    updateLoadStatus("Keine offenen Geocodes");
    setTimeout(refreshLoadStatus, 1500);
    return;
  }

  let ok = 0;
  let fail = 0;

  for(let i=0; i<missing.length; i++){
    const row = missing[i];
    updateLoadStatus(`Geocoding ${i+1}/${missing.length} …`);

    const geo = await geocodeStationQuery(row.geoQuery);
    if(geo && isFinite(geo.lat) && isFinite(geo.lon)){
      row.lat = geo.lat;
      row.lon = geo.lon;

      const rowKey = getStationRowKey(row.raw, row.rowIndex);
      stationGeoCache[rowKey] = { lat: geo.lat, lon: geo.lon, label: geo.label || row.geoQuery };
      saveLS(LS_STATION_GEO_CACHE, stationGeoCache);
      ok++;
    }else{
      fail++;
    }

    await sleep(1100);
  }

  renderStations(lastResults);
  refreshLoadStatus();

  updateLoadStatus(`Geocoding fertig · gefunden ${ok} · offen ${fail}`);
  setTimeout(refreshLoadStatus, 1800);

  if(fail > 0){
    openMissingPanel();
  }
}

function getCo2Calc(preisBasis, co2Raw, co2Mod){
  const mode = normText(co2Mod);
  const co2Plus = isFinite(co2Raw) ? Math.abs(co2Raw) : 0;

  if(mode === "add"){
    return {
      co2Anteil: co2Plus,
      preisNachCo2: preisBasis + co2Plus,
      co2ModeLabel: "add"
    };
  }

  if(mode === "incl" || mode === "included"){
    return {
      co2Anteil: 0,
      preisNachCo2: preisBasis,
      co2ModeLabel: "incl"
    };
  }

  return {
    co2Anteil: 0,
    preisNachCo2: preisBasis,
    co2ModeLabel: mode || "—"
  };
}

function calcRowValues(base, usedKm, inputs){
  const qtyT = inputs.qtyT;
  const freightPerKm = inputs.freightPerKm;
  const calcMode = inputs.calcMode;
  const targetValue = inputs.targetValue;

  const freightPerT = (usedKm * freightPerKm / qtyT);
  const ekProT = base.preisNachCo2 + freightPerT;
  const gesamt = ekProT * qtyT;

  const targetEk = calcMode === "targetEk" ? targetValue : NaN;
  const targetMargin = calcMode === "targetMargin" ? targetValue : NaN;
  const delta = isFinite(targetEk) ? (targetEk - ekProT) : NaN;
  const mindestEk = calcMode === "targetMargin" && isFinite(targetMargin)
    ? (ekProT - targetMargin)
    : NaN;
  const displayValue = calcMode === "targetMargin" ? mindestEk : ekProT;

  return {
    ...base,
    calcMode,
    calcKm: usedKm,
    freightPerT,
    ekProT,
    gesamt,
    targetEk,
    targetMargin,
    delta,
    mindestEk,
    displayValue
  };
}

function getRouteCacheKey(from, to){
  return `${from.lat.toFixed(5)},${from.lon.toFixed(5)}__${to.lat.toFixed(5)},${to.lon.toFixed(5)}`;
}

async function getRouteData(from, to){
  const key = getRouteCacheKey(from, to);
  if(routeCache[key]) return routeCache[key];

  try{
    const url = `https://router.project-osrm.org/route/v1/driving/${from.lon},${from.lat};${to.lon},${to.lat}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();

    if(data && data.routes && data.routes[0]){
      const r = data.routes[0];
      const result = {
        km: r.distance / 1000,
        minutes: r.duration / 60,
        geometry: r.geometry
      };
      routeCache[key] = result;
      saveLS(LS_ROUTE_CACHE, routeCache);
      return result;
    }
  }catch(e){
    console.error("Routing Fehler:", e);
  }
  return null;
}

async function enrichResultsWithRouteKm(results, origin, inputs){
  for(let i=0;i<results.length;i++){
    const row = results[i];
    updateLoadStatus(`Routen werden berechnet … ${i+1}/${results.length}`);

    const route = await getRouteData(origin, row.entity);
    if(route && isFinite(route.km)){
      const updated = calcRowValues(row, route.km, inputs);
      updated.routeMinutes = route.minutes;
      updated.routeGeometry = route.geometry || null;
      results[i] = updated;
    }else{
      const fallback = calcRowValues(row, row.kmAir, inputs);
      fallback.routeMinutes = null;
      fallback.routeGeometry = null;
      results[i] = fallback;
    }
  }
  return results;
}

async function calculate(){
  clearRoute();
  hideDetail();
  currentFocusedRow = null;

  const panel = document.getElementById("panel");
  panel.classList.remove("hidden");
  if(isMobile) panel.classList.remove("collapsed");

  const out = document.getElementById("results");
  out.innerHTML = "";

  const inputs = getInputs();
  const { supplierQuery, behandlung, avv, qtyT, calcMode, targetValue } = inputs;

  document.getElementById("kpiQty").textContent = `Menge: ${fmt(qtyT,1)} t`;
  document.getElementById("kpiRoute").textContent = "—";

  if(!supplierQuery){
    out.innerHTML = `<div class="small">Bitte PLZ oder Stadt vom Lieferanten eingeben.</div>`;
    document.getElementById("kpiCount").textContent = "—";
    return;
  }
  if(!behandlung){
    out.innerHTML = `<div class="small">Bitte eine Behandlung auswählen.</div>`;
    document.getElementById("kpiCount").textContent = "—";
    return;
  }
  if(!avv){
    out.innerHTML = `<div class="small">Bitte eine AVV auswählen.</div>`;
    document.getElementById("kpiCount").textContent = "—";
    return;
  }
  if(calcMode === "targetMargin" && !isFinite(targetValue)){
    out.innerHTML = `<div class="small">Bitte einen Ziel-Rohertrag eingeben.</div>`;
    document.getElementById("kpiCount").textContent = "—";
    return;
  }

  updateLoadStatus("Lieferant wird geocodet …");
  const geo = await geocodeSupplierLocation(supplierQuery);

  if(!geo){
    out.innerHTML = `<div class="small">PLZ oder Stadt konnte nicht gefunden werden.</div>`;
    document.getElementById("kpiCount").textContent = "0";
    updateLoadStatus("⚠️ Ort nicht gefunden");
    setTimeout(refreshLoadStatus, 1800);
    return;
  }

  setStartPoint(geo, supplierQuery);

  const avvInfo = avvMap.get(normAvv(avv));
  const co2Raw = avvInfo && isFinite(avvInfo.co2) ? avvInfo.co2 : NaN;

  let results = [];
  const selectedAvvNorm = normAvv(avv);

  for(const x of getRenderableStations()){
    if(normText(x.behandlung) !== normText(behandlung)) continue;
    if(!stationAcceptsAvv(x, selectedAvvNorm)) continue;

    const kmAir = haversineKm(startPoint.lat, startPoint.lon, x.lat, x.lon);
    const preisBasis = isFinite(x.preisBasis) ? x.preisBasis : 0;

    const co2Calc = getCo2Calc(preisBasis, co2Raw, x.co2Mod);

    const base = {
      entity: x,
      kmAir,
      preisBasis,
      co2Raw,
      co2Mod: co2Calc.co2ModeLabel,
      co2Anteil: co2Calc.co2Anteil,
      preisNachCo2: co2Calc.preisNachCo2,
      routeMinutes: null,
      routeGeometry: null
    };

    results.push(calcRowValues(base, kmAir, inputs));
  }

  if(!results.length){
    lastResults = [];
    document.getElementById("kpiCount").textContent = "0";
    renderStations([]);
    out.innerHTML = `<div class="small">Keine passenden Ladestellen gefunden.</div>`;
    refreshLoadStatus();
    return;
  }

  document.getElementById("kpiCount").textContent = String(results.length);
  renderStations(results);

  const bounds = L.latLngBounds(results.map(r=>[r.entity.lat, r.entity.lon]));
  bounds.extend([startPoint.lat, startPoint.lon]);
  map.fitBounds(bounds, {padding:[35,35]});

  results = await enrichResultsWithRouteKm(results, startPoint, inputs);
  results.sort((a,b)=>a.displayValue - b.displayValue);

  lastResults = results;
  document.getElementById("kpiCount").textContent = String(results.length);
  renderStations(results);
  refreshLoadStatus();

  renderResultsTable(results, inputs);
}

function renderResultsTable(results, inputs){
  const out = document.getElementById("results");
  out.innerHTML = "";

  const calcMode = inputs.calcMode;
  const qtyT = inputs.qtyT;
  const modeHeader = calcMode === "targetMargin" ? "Mindest-EK / t" : "EK / t";
  const infoHeader = calcMode === "targetMargin" ? "Rohertrag" : (isFinite(inputs.targetValue) ? "Abweichung" : "Info");

  const table = document.createElement("table");
  table.innerHTML = `
    <thead>
      <tr>
        <th>Firma / Ladestelle</th>
        <th>KM</th>
        <th>${modeHeader}</th>
        <th>${infoHeader}</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector("tbody");

  for(const row of results){
    const valueLine = calcMode === "targetMargin"
      ? `<b>${fmt(row.mindestEk)} €/t</b><br><span class="small">EK abzüglich Ziel-Rohertrag</span>`
      : `<b>${fmt(row.ekProT)} €/t</b><br><span class="small">${fmt(row.gesamt)} € für ${fmt(qtyT,1)} t</span>`;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        <b>${esc(row.entity.firma || "—")}</b><br>
        <span class="small">${esc(row.entity.ladestelle)}</span><br>
        <span class="small">AVV ${esc((row.entity.avvList && row.entity.avvList.length ? row.entity.avvList.join(", ") : row.entity.avvRaw) || "—")} · ${esc(row.entity.behandlung)} · Basis ${fmt(row.preisBasis)} €/t · CO2_mod ${esc(row.co2Mod)}</span>
      </td>
      <td>${fmt(row.calcKm,0)}</td>
      <td>${valueLine}</td>
      <td>${makeBadge(row)}</td>
    `;

    tr.addEventListener("click", async ()=>{
      await showRouteDetails(startPoint, row.entity, row);
    });

    tbody.appendChild(tr);
  }

  out.appendChild(table);
}

function makeBadge(row){
  if(row.calcMode === "targetMargin"){
    if(!isFinite(row.targetMargin)) return `<span class="badge">—</span>`;
    return `<span class="badge good">Rohertrag ${fmt(row.targetMargin)} €/t</span>`;
  }

  if(!isFinite(row.targetEk)) return `<span class="badge">Klick für Route</span>`;
  const d = row.delta;
  if(!isFinite(d)) return `<span class="badge">—</span>`;
  if(d >= 10) return `<span class="badge good">+${fmt(d)} €/t</span>`;
  if(d >= 0)  return `<span class="badge mid">+${fmt(d)} €/t</span>`;
  return `<span class="badge bad">${fmt(d)} €/t</span>`;
}

function getResultColor(row){
  if(row.calcMode === "targetMargin" && isFinite(row.targetMargin)) return "#2563eb";
  if(!isFinite(row.targetEk) || !isFinite(row.delta)) return "#2563eb";
  if(row.delta >= 10) return "#16a34a";
  if(row.delta >= 0) return "#f59e0b";
  return "#dc2626";
}

async function showRouteDetails(origin, target, baseRow){
  clearRoute();
  document.getElementById("kpiRoute").textContent = "Route lädt …";

  let usedKm = baseRow.calcKm;
  let minutes = baseRow.routeMinutes ?? null;
  let geometry = baseRow.routeGeometry ?? null;

  const route = await getRouteData(origin, target);
  if(route && isFinite(route.km)){
    usedKm = route.km;
    minutes = route.minutes;
    geometry = route.geometry || null;
  }

  if(geometry && geometry.coordinates){
    const latlngs = geometry.coordinates.map(([lon, lat]) => [lat, lon]);
    routeLayer = L.polyline(latlngs, {
      color: getComputedStyle(document.body).getPropertyValue("--route").trim() || "#2563eb",
      weight: 5,
      opacity: 0.9
    }).addTo(map);

    try{
      map.fitBounds(routeLayer.getBounds(), {padding:[30,30]});
    }catch(e){}
  }

  const recalculated = calcRowValues(baseRow, usedKm, getInputs());
  recalculated.routeMinutes = minutes;
  recalculated.routeGeometry = geometry;

  document.getElementById("kpiRoute").textContent =
    `${fmt(usedKm,0)} km${isFinite(minutes) ? ` · ${fmt(minutes,0)} min` : ""}`;

  currentFocusedRow = {
    ...recalculated,
    entity: target,
    routeKm: usedKm,
    durationMin: minutes
  };

  const idx = lastResults.findIndex(r => r.entity.id === target.id);
  if(idx >= 0){
    lastResults[idx] = { ...recalculated };
    lastResults.sort((a,b)=>a.displayValue - b.displayValue);
    renderResultsTable(lastResults, getInputs());
  }

  renderStations(lastResults);
  showDetail(currentFocusedRow);
}

function clearRoute(){
  if(routeLayer){
    try{ map.removeLayer(routeLayer); }catch(e){}
    routeLayer = null;
  }
  document.getElementById("kpiRoute").textContent = "—";
}

function hideDetail(){
  document.getElementById("detailBox").style.display="none";
  document.getElementById("detailGrid").innerHTML="";
  document.getElementById("detailTitle").textContent="Details";
}

function buildStationGeocodeQuery(row){
  const parts = [
    getFirstFilledValue(row, ["ladestelle"]),
    getFirstFilledValue(row, ["adresse","strasse","straße"]),
    getFirstFilledValue(row, ["hausnummer"]),
    getFirstFilledValue(row, ["plz"]),
    getFirstFilledValue(row, ["ort","stadt"]),
    getFirstFilledValue(row, ["land"]),
    "Deutschland"
  ].map(v => str(v).trim()).filter(Boolean);

  const unique = [];
  const seen = new Set();
  for(const p of parts){
    const k = normText(p);
    if(!k || seen.has(k)) continue;
    seen.add(k);
    unique.push(p);
  }
  return unique.join(", ");
}

function getStationRowKey(row, idx){
  const keyParts = [
    str(getFirstFilledValue(row, ["firma"])).trim(),
    str(getFirstFilledValue(row, ["ladestelle"])).trim(),
    str(getFirstFilledValue(row, ["adresse","strasse","straße"])).trim(),
    str(getFirstFilledValue(row, ["plz"])).trim(),
    str(getFirstFilledValue(row, ["ort","stadt"])).trim(),
    String(idx)
  ].join("|");
  return "row__" + normText(keyParts);
}

function cleanAvvCode(v){
  let s = str(v).replace(/\D/g, "");
  if(s.length === 5) s = s.padStart(6, "0");
  return s.length === 6 ? s : "";
}

function normAvv(v){
  return cleanAvvCode(v);
}

function parseAvvList(value){
  const raw = str(value).trim();
  if(!raw) return [];

  const found = [];
  const seen = new Set();

  const spacedMatches = raw.match(/\d{2}\s*\d{2}\s*\d{2}/g) || [];
  for(const m of spacedMatches){
    const code = cleanAvvCode(m);
    if(code && !seen.has(code)){
      seen.add(code);
      found.push(code);
    }
  }

  const plainMatches = raw.match(/\d{5,6}/g) || [];
  for(const m of plainMatches){
    const code = cleanAvvCode(m);
    if(code && !seen.has(code)){
      seen.add(code);
      found.push(code);
    }
  }

  return found;
}

function stationAcceptsAvv(station, selectedAvv){
  const selected = cleanAvvCode(selectedAvv);
  if(!selected) return false;

  const raw = str(station.avvRaw).trim();
  if(!raw) return false;

  const codes = parseAvvList(raw);
  if(codes.includes(selected)) return true;

  const selectedNoZero = selected.replace(/^0+/, "");
  return codes.some(code => code.replace(/^0+/, "") === selectedNoZero);
}

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function getInputs(){
  return {
    supplierQuery: str(document.getElementById("supplierQuery").value).trim(),
    behandlung: str(document.getElementById("treatment").value).trim(),
    avv: str(document.getElementById("avvSelect").value).trim(),
    qtyT: Math.max(0.1, toNum(document.getElementById("qtyT").value) || 24),
    freightPerKm: toNum(document.getElementById("freightPerKm").value) || 1.85,
    calcMode: str(document.getElementById("calcMode").value).trim() || "targetEk",
    targetValue: toNum(document.getElementById("targetValue").value)
  };
}

function toNum(v){
  if(v===null || v===undefined) return NaN;
  if(typeof v==="number") return v;
  let s = String(v).trim();
  if(!s) return NaN;
  s = s.replace(/[€\s]/g, "");
  const hasComma = s.includes(",");
  const hasDot = s.includes(".");
  if(hasComma && hasDot) s = s.replace(/\./g, "").replace(",", ".");
  else if(hasComma && !hasDot) s = s.replace(",", ".");
  else s = s.replace(/,/g, "");
  const n = parseFloat(s);
  return Number.isFinite(n) ? n : NaN;
}
function str(v){ return (v===null || v===undefined) ? "" : String(v); }
function fmt(n, dec=2){
  if(!isFinite(n)) return "—";
  return n.toFixed(dec).replace(".", ",");
}
function esc(s){
  return String(s).replace(/[&<>"']/g, m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[m]));
}
function escAttr(s){
  return String(s).replace(/"/g, "&quot;");
}
function normText(s){
  return String(s||"")
    .trim()
    .toLowerCase()
    .replace(/\s+/g," ")
    .replace(/[.,;:_/\\|()\-–—]/g,"")
    .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss");
}
function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const toRad = d => d * Math.PI/180;
  const dLat = toRad(lat2-lat1);
  const dLon = toRad(lon2-lon1);
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*(Math.sin(dLon/2)**2);
  return 2*R*Math.asin(Math.sqrt(a));
}
